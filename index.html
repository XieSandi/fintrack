<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FinTrack</title>
  <meta name="description" content="Personal finance tracker — expense, budget & net worth" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-box">
      <img src="./icons/icon-192.png" alt="FinTrack" width="72" height="72" style="border-radius:18px" />
      <h1>FinTrack</h1>
      <p>Track pengeluaran harian, budget bulanan,<br/>dan progress net worth lo.</p>
      <button id="btn-google-login" class="btn btn-primary btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81Z"/></svg>
        Masuk dengan Google
      </button>
      <div id="login-error" class="login-error hidden"></div>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="app hidden">
    <header class="header">
      <div class="header-left">
        <span class="header-title" id="header-title">FinTrack</span>
      </div>
      <div class="header-right">
        <span id="sync-dot" class="sync-dot" title="Status koneksi"></span>
        <button id="month-btn" class="month-btn hidden">
          <span id="month-label"></span>
        </button>
      </div>
    </header>

    <main id="view" class="view"></main>

    <button id="fab" class="fab" aria-label="Tambah transaksi">＋</button>

    <nav class="bottomnav">
      <a href="#/home" data-route="home"><span class="nav-ic">🏠</span><span>Home</span></a>
      <a href="#/transactions" data-route="transactions"><span class="nav-ic">📒</span><span>Transaksi</span></a>
      <span class="nav-spacer"></span>
      <a href="#/budget" data-route="budget"><span class="nav-ic">📊</span><span>Budget</span></a>
      <a href="#/wealth" data-route="wealth"><span class="nav-ic">💰</span><span>Wealth</span></a>
    </nav>
  </div>

  <!-- Generic bottom sheet -->
  <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>
  <div id="sheet" class="sheet hidden"></div>

  <div id="toast" class="toast hidden"></div>

  <div id="app-loading" class="app-loading"><div class="spinner"></div></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
